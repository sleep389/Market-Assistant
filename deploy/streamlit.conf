# =============================================================================
# Nginx Reverse Proxy for Marketing Multi-Agent System
# =============================================================================
# Usage:
#   1. Replace "your-domain.com" with your actual domain
#   2. Copy to /etc/nginx/conf.d/streamlit.conf
#   3. Test:  nginx -t
#   4. Apply: systemctl reload nginx
#   5. SSL:   certbot --nginx -d your-domain.com
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (uncomment after SSL is configured)
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# ---------------------------------------------------------------------------
# HTTP server (use this before SSL is configured)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name your-domain.com;

    # Increase max body size for larger requests
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Streamlit WebSocket support
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Extended timeouts for long-running AI generation
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Streamlit static assets
    location /static/ {
        proxy_pass http://127.0.0.1:8501/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Streamlit health check endpoint
    location /_stcore/health {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Streamlit WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }
}

